name: Run elt_bronze_silver_incremental Daily

on:
  schedule:
    - cron: "0 17 * * *"  # 14h de Brasília (17h UTC)
  workflow_dispatch:

permissions:
  contents: write 

jobs:
  run-notebook:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r src/requirements.txt

      - name: Run Bronze notebook
        run: |
          jupyter nbconvert --to notebook --execute --inplace src/elt_bronze_incremental.ipynb

      - name: Run Silver notebook
        run: |
          jupyter nbconvert --to notebook --execute --inplace src/elt_silver_incremental.ipynb

      - name: Commit and push data updates
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          rm -rf data/01_bronze/* data/02_silver/*
          git add -A
          git add data/01_bronze/**/*.parquet \
                 data/02_silver/**/*.parquet || echo "No data changes"
          git commit -m "Daily run $(date -u +'%d-%m-%Y'): ELT Bronze + Silver"
          git push origin HEAD:${{ github.ref }}
